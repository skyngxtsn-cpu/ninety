name: Fetch Lineups (W杯 自動取得)

on:
  schedule:
    # 5 分ごとに実行（W杯 期間中は試合直前にスタメンが乗るのを拾う）
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      from:
        description: "テスト用 dateFrom (YYYY-MM-DD)"
        required: false
        default: ""
      to:
        description: "テスト用 dateTo (YYYY-MM-DD)"
        required: false
        default: ""

concurrency:
  group: fetch-lineups
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Fetch lineups from football-data.org
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          LINEUP_FROM: ${{ inputs.from }}
          LINEUP_TO: ${{ inputs.to }}
        run: node scripts/fetch-lineups.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "ninety-bot"
          git config user.email "bot@users.noreply.github.com"
          if ! git diff --quiet src/lib/data/lineup-overrides-auto.json src/lib/data/match-results-auto.json; then
            git add src/lib/data/lineup-overrides-auto.json src/lib/data/match-results-auto.json
            git commit -m "auto: lineup/results update $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          else
            echo "No changes"
          fi
