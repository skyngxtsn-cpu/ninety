name: Fetch Lineups (W杯 自動取得)

on:
  schedule:
    # 5 分ごとに実行（W杯 期間中は試合直前にスタメンが乗るのを拾う）
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      from:
        description: "テスト用 dateFrom (YYYY-MM-DD)"
        required: false
        default: ""
      to:
        description: "テスト用 dateTo (YYYY-MM-DD)"
        required: false
        default: ""

concurrency:
  group: fetch-lineups
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Fetch lineups from football-data.org
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          LINEUP_FROM: ${{ inputs.from }}
          LINEUP_TO: ${{ inputs.to }}
          # 変更検知時に Redis 直書き込み + push-tick 即時起動するために必要。
          # 未設定なら JSON コミットのみで従来通り Vercel デプロイ経由になる。
          KV_REST_API_URL: ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}
          TICK_SECRET: ${{ secrets.TICK_SECRET }}
          SITE_URL: "https://ninety-sand.vercel.app"
        run: node scripts/fetch-lineups.mjs

      - name: Commit and push if changed
        # Vercel Hobby は project owner 以外のコミットでのデプロイをブロックするため、
        # 所有者の noreply メアドで author を上書きする。
        run: |
          git config user.name "skyngxtsn-cpu"
          git config user.email "280671677+skyngxtsn-cpu@users.noreply.github.com"
          if ! git diff --quiet src/lib/data/lineup-overrides-auto.json src/lib/data/match-results-auto.json; then
            git add src/lib/data/lineup-overrides-auto.json src/lib/data/match-results-auto.json
            git commit -m "auto: lineup/results update $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          else
            echo "No changes"
          fi
